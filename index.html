<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpendWise — Penjejak Perbelanjaan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1917;
    --surface2: #232220;
    --border: #2e2c29;
    --accent: #e8c547;
    --accent2: #f0a050;
    --accent3: #5dd6a8;
    --accent4: #e87070;
    --text: #f0ede8;
    --muted: #8a8680;
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    min-height: 100vh;
  }

  /* === HEADER === */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 36px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--text); }

  .header-date {
    color: var(--muted);
    font-size: 0.8rem;
    text-align: right;
  }

  /* === LAYOUT === */
  .container {
    max-width: 1300px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  .grid {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 24px;
    align-items: start;
  }

  /* === CARDS === */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
  }

  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    margin-bottom: 20px;
    color: var(--text);
  }

  /* === STATS ROW === */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: var(--radius) var(--radius) 0 0;
  }

  .stat-card.yellow::before { background: var(--accent); }
  .stat-card.orange::before { background: var(--accent2); }
  .stat-card.green::before { background: var(--accent3); }
  .stat-card.red::before { background: var(--accent4); }

  .stat-label {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
    color: var(--text);
    line-height: 1;
  }

  .stat-sub {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 6px;
  }

  /* === FORM === */
  .form-group { margin-bottom: 16px; }

  label {
    display: block;
    font-size: 0.78rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 7px;
  }

  input, select, textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
  }

  select option { background: var(--surface2); }

  textarea { resize: vertical; min-height: 70px; }

  .btn {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: #0f0e0c;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 4px;
  }

  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.99); }

  .btn-outline {
    background: transparent;
    color: var(--accent4);
    border: 1px solid var(--accent4);
    margin-top: 8px;
    font-weight: 500;
  }

  .btn-outline:hover { background: rgba(232,112,112,0.08); opacity: 1; }

  /* === TAB FILTER === */
  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .tab {
    padding: 7px 16px;
    border-radius: 30px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active, .tab:hover {
    background: var(--accent);
    color: #0f0e0c;
    border-color: var(--accent);
    font-weight: 600;
  }

  /* === SEARCH === */
  .search-row {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
  }

  .search-row input { flex: 1; }

  .search-row select { width: 160px; flex-shrink: 0; }

  /* === TABLE === */
  .table-wrap {
    overflow-x: auto;
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    background: var(--surface2);
    padding: 12px 16px;
    text-align: left;
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    white-space: nowrap;
  }

  td {
    padding: 13px 16px;
    border-top: 1px solid var(--border);
    font-size: 0.88rem;
    vertical-align: middle;
  }

  tr:hover td { background: rgba(255,255,255,0.02); }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 500;
  }

  .del-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--accent4);
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    font-size: 0.78rem;
    transition: all 0.2s;
  }

  .del-btn:hover { background: var(--accent4); color: #fff; border-color: var(--accent4); }

  .amount-neg { color: var(--accent4); font-weight: 600; }
  .amount-pos { color: var(--accent3); font-weight: 600; }

  /* === CHART AREA === */
  .chart-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 24px;
  }

  .chart-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
  }

  .chart-title {
    font-size: 0.78rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 16px;
  }

  /* Bar chart */
  .bar-chart { display: flex; flex-direction: column; gap: 10px; }

  .bar-row { display: flex; align-items: center; gap: 10px; }

  .bar-label { width: 90px; font-size: 0.78rem; color: var(--muted); text-align: right; flex-shrink: 0; }

  .bar-track {
    flex: 1;
    height: 22px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s cubic-bezier(.34,1.2,.64,1);
    display: flex;
    align-items: center;
    padding-left: 8px;
    font-size: 0.7rem;
    font-weight: 600;
    color: #0f0e0c;
    white-space: nowrap;
  }

  /* Donut */
  .donut-wrap { display: flex; align-items: center; gap: 20px; }
  .donut-svg { flex-shrink: 0; }
  .donut-legend { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.78rem; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* === MONTHLY LINE === */
  .monthly-chart { margin-top: 8px; }

  .month-bars { display: flex; align-items: flex-end; gap: 8px; height: 100px; }

  .month-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }

  .month-bar {
    width: 100%;
    border-radius: 4px 4px 0 0;
    transition: height 0.5s ease;
  }

  .month-name { font-size: 0.65rem; color: var(--muted); }

  /* === EMPTY STATE === */
  .empty {
    text-align: center;
    padding: 40px;
    color: var(--muted);
  }

  .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }

  /* === TOAST === */
  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--accent3);
    color: #0f0e0c;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    z-index: 999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(.34,1.2,.64,1);
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { background: var(--accent4); color: #fff; }

  /* === SCROLLBAR === */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface2); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* === RESPONSIVE === */
  @media (max-width: 1000px) {
    .grid { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .chart-grid { grid-template-columns: 1fr; }
  }

  @media (max-width: 560px) {
    header { padding: 16px 18px; }
    .container { padding: 18px 14px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Spend<span>Wise</span></div>
  <div class="header-date" id="headerDate"></div>
</header>

<div class="container">

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card yellow">
      <div class="stat-label">Jumlah Perbelanjaan</div>
      <div class="stat-value" id="statTotal">RM 0.00</div>
      <div class="stat-sub" id="statCount">0 transaksi</div>
    </div>
    <div class="stat-card orange">
      <div class="stat-label">Bulan Ini</div>
      <div class="stat-value" id="statMonth">RM 0.00</div>
      <div class="stat-sub" id="statMonthCount">0 transaksi</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">Kategori Tertinggi</div>
      <div class="stat-value" id="statTopCat" style="font-size:1.1rem;padding-top:6px;">—</div>
      <div class="stat-sub" id="statTopCatAmt"></div>
    </div>
    <div class="stat-card red">
      <div class="stat-label">Perbelanjaan Terbesar</div>
      <div class="stat-value" id="statMax">RM 0.00</div>
      <div class="stat-sub" id="statMaxName">—</div>
    </div>
  </div>

  <div class="grid">

    <!-- FORM -->
    <div>
      <div class="card">
        <div class="card-title">Tambah Perbelanjaan</div>

        <div class="form-group">
          <label>Nama Item / Penerangan</label>
          <input type="text" id="fName" placeholder="cth: Makan tengah hari, Minyak kereta...">
        </div>

        <div class="form-group">
          <label>Jumlah (RM)</label>
          <input type="number" id="fAmount" placeholder="0.00" step="0.01" min="0">
        </div>

        <div class="form-group">
          <label>Kategori</label>
          <select id="fCategory">
            <option value="">— Pilih Kategori —</option>
            <option value="Makanan">🍜 Makanan & Minuman</option>
            <option value="Pengangkutan">🚗 Pengangkutan</option>
            <option value="Utiliti">💡 Utiliti & Bil</option>
            <option value="Kesihatan">🏥 Kesihatan</option>
            <option value="Pendidikan">📚 Pendidikan</option>
            <option value="Hiburan">🎮 Hiburan</option>
            <option value="Pakaian">👔 Pakaian & Fesyen</option>
            <option value="Belian">🛒 Belian Am</option>
            <option value="Lain-lain">📦 Lain-lain</option>
          </select>
        </div>

        <div class="form-group">
          <label>Tarikh</label>
          <input type="date" id="fDate">
        </div>

        <div class="form-group">
          <label>Nota (Pilihan)</label>
          <textarea id="fNote" placeholder="Tambah nota tambahan di sini..."></textarea>
        </div>

        <button class="btn" onclick="addExpense()">+ Tambah Perbelanjaan</button>
        <button class="btn btn-outline" onclick="clearAll()">🗑 Padam Semua Data</button>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div>
      <div class="card">
        <div class="card-title">Rekod Perbelanjaan</div>

        <div class="tabs" id="tabsRow">
          <button class="tab active" onclick="filterCat('')" data-cat="">Semua</button>
          <button class="tab" onclick="filterCat('Makanan')" data-cat="Makanan">🍜 Makanan</button>
          <button class="tab" onclick="filterCat('Pengangkutan')" data-cat="Pengangkutan">🚗 Pengangkutan</button>
          <button class="tab" onclick="filterCat('Utiliti')" data-cat="Utiliti">💡 Utiliti</button>
          <button class="tab" onclick="filterCat('Kesihatan')" data-cat="Kesihatan">🏥 Kesihatan</button>
          <button class="tab" onclick="filterCat('Pendidikan')" data-cat="Pendidikan">📚 Pendidikan</button>
          <button class="tab" onclick="filterCat('Hiburan')" data-cat="Hiburan">🎮 Hiburan</button>
          <button class="tab" onclick="filterCat('Lain-lain')" data-cat="Lain-lain">📦 Lain</button>
        </div>

        <div class="search-row">
          <input type="text" id="searchInput" placeholder="🔍  Cari perbelanjaan..." oninput="renderTable()">
          <select id="sortSelect" onchange="renderTable()">
            <option value="date-desc">Tarikh Terbaru</option>
            <option value="date-asc">Tarikh Lama</option>
            <option value="amount-desc">Jumlah Tertinggi</option>
            <option value="amount-asc">Jumlah Terendah</option>
          </select>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Tarikh</th>
                <th>Nama</th>
                <th>Kategori</th>
                <th>Jumlah</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="expenseTable"></tbody>
          </table>
        </div>
      </div>

      <!-- CHARTS -->
      <div class="chart-grid">
        <div class="chart-container">
          <div class="chart-title">Perbelanjaan Mengikut Kategori</div>
          <div class="bar-chart" id="barChart"></div>
        </div>
        <div class="chart-container">
          <div class="chart-title">Agihan Kategori</div>
          <div class="donut-wrap">
            <svg class="donut-svg" width="110" height="110" viewBox="0 0 110 110" id="donutSvg"></svg>
            <div class="donut-legend" id="donutLegend"></div>
          </div>
        </div>
      </div>

      <div class="chart-container" style="margin-top:20px;">
        <div class="chart-title">Perbelanjaan 6 Bulan Kebelakangan</div>
        <div class="month-bars" id="monthBars"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// DATA LAYER — LocalStorage
// ============================================================
const STORAGE_KEY = 'spendwise_expenses';

function loadData() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch { return []; }
}

function saveData(arr) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
}

let expenses = loadData();
let currentFilter = '';

// Category colors
const CAT_COLORS = {
  'Makanan':       '#e8c547',
  'Pengangkutan':  '#f0a050',
  'Utiliti':       '#5dd6a8',
  'Kesihatan':     '#e87070',
  'Pendidikan':    '#78b0f5',
  'Hiburan':       '#c87af0',
  'Pakaian':       '#f57ab8',
  'Belian':        '#f0d050',
  'Lain-lain':     '#8a8680',
};

// ============================================================
// INPUT — Add Expense
// ============================================================
function addExpense() {
  const name   = document.getElementById('fName').value.trim();
  const amount = parseFloat(document.getElementById('fAmount').value);
  const cat    = document.getElementById('fCategory').value;
  const date   = document.getElementById('fDate').value;
  const note   = document.getElementById('fNote').value.trim();

  if (!name)            return showToast('Sila masukkan nama item!', true);
  if (!amount || amount <= 0) return showToast('Sila masukkan jumlah yang sah!', true);
  if (!cat)             return showToast('Sila pilih kategori!', true);
  if (!date)            return showToast('Sila pilih tarikh!', true);

  const record = {
    id: Date.now(),
    name, amount, cat, date, note
  };

  expenses.push(record);
  saveData(expenses);

  document.getElementById('fName').value    = '';
  document.getElementById('fAmount').value  = '';
  document.getElementById('fCategory').value = '';
  document.getElementById('fNote').value    = '';

  renderAll();
  showToast('✓ Perbelanjaan ditambah berjaya!');
}

// ============================================================
// DELETE
// ============================================================
function deleteExpense(id) {
  expenses = expenses.filter(e => e.id !== id);
  saveData(expenses);
  renderAll();
  showToast('Rekod dipadam.', true);
}

function clearAll() {
  if (!expenses.length) return;
  if (!confirm('Padam SEMUA data perbelanjaan?')) return;
  expenses = [];
  saveData(expenses);
  renderAll();
  showToast('Semua data dipadam.', true);
}

// ============================================================
// FILTER & SEARCH
// ============================================================
function filterCat(cat) {
  currentFilter = cat;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.cat === cat);
  });
  renderTable();
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;

  let arr = expenses.filter(e => {
    const catMatch = !currentFilter || e.cat === currentFilter;
    const qMatch   = !q || e.name.toLowerCase().includes(q) || e.cat.toLowerCase().includes(q);
    return catMatch && qMatch;
  });

  if (sort === 'date-desc') arr.sort((a,b) => b.date.localeCompare(a.date));
  if (sort === 'date-asc')  arr.sort((a,b) => a.date.localeCompare(b.date));
  if (sort === 'amount-desc') arr.sort((a,b) => b.amount - a.amount);
  if (sort === 'amount-asc')  arr.sort((a,b) => a.amount - b.amount);

  return arr;
}

// ============================================================
// RENDER TABLE
// ============================================================
function renderTable() {
  const arr  = getFiltered();
  const tbody = document.getElementById('expenseTable');

  if (!arr.length) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty"><div class="empty-icon">📋</div>Tiada rekod dijumpai.</div></td></tr>`;
    return;
  }

  tbody.innerHTML = arr.map(e => {
    const color = CAT_COLORS[e.cat] || '#8a8680';
    const d = new Date(e.date);
    const dateStr = d.toLocaleDateString('ms-MY', {day:'2-digit', month:'short', year:'numeric'});
    return `<tr>
      <td style="color:var(--muted);font-size:0.82rem;">${dateStr}</td>
      <td>
        <div style="font-weight:500">${esc(e.name)}</div>
        ${e.note ? `<div style="font-size:0.75rem;color:var(--muted);margin-top:2px;">${esc(e.note)}</div>` : ''}
      </td>
      <td><span class="badge" style="background:${color}22;color:${color}">${esc(e.cat)}</span></td>
      <td class="amount-neg">RM ${e.amount.toFixed(2)}</td>
      <td><button class="del-btn" onclick="deleteExpense(${e.id})">Padam</button></td>
    </tr>`;
  }).join('');
}

// ============================================================
// RENDER STATS
// ============================================================
function renderStats() {
  const total = expenses.reduce((s, e) => s + e.amount, 0);
  document.getElementById('statTotal').textContent = `RM ${total.toFixed(2)}`;
  document.getElementById('statCount').textContent = `${expenses.length} transaksi`;

  const now = new Date();
  const monthExp = expenses.filter(e => {
    const d = new Date(e.date);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  });
  const monthTotal = monthExp.reduce((s,e) => s+e.amount, 0);
  document.getElementById('statMonth').textContent = `RM ${monthTotal.toFixed(2)}`;
  document.getElementById('statMonthCount').textContent = `${monthExp.length} transaksi`;

  // Top category
  const catTotals = {};
  expenses.forEach(e => { catTotals[e.cat] = (catTotals[e.cat]||0) + e.amount; });
  const topCat = Object.entries(catTotals).sort((a,b)=>b[1]-a[1])[0];
  if (topCat) {
    document.getElementById('statTopCat').textContent = topCat[0];
    document.getElementById('statTopCatAmt').textContent = `RM ${topCat[1].toFixed(2)}`;
  } else {
    document.getElementById('statTopCat').textContent = '—';
    document.getElementById('statTopCatAmt').textContent = '';
  }

  // Max single expense
  if (expenses.length) {
    const mx = expenses.reduce((a,b) => a.amount > b.amount ? a : b);
    document.getElementById('statMax').textContent = `RM ${mx.amount.toFixed(2)}`;
    document.getElementById('statMaxName').textContent = mx.name;
  } else {
    document.getElementById('statMax').textContent = 'RM 0.00';
    document.getElementById('statMaxName').textContent = '—';
  }
}

// ============================================================
// RENDER BAR CHART
// ============================================================
function renderBarChart() {
  const catTotals = {};
  expenses.forEach(e => { catTotals[e.cat] = (catTotals[e.cat]||0) + e.amount; });
  const sorted = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
  const max = sorted[0]?.[1] || 1;

  const el = document.getElementById('barChart');
  if (!sorted.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">📊</div>Tiada data.</div>'; return; }

  el.innerHTML = sorted.map(([cat, amt]) => {
    const pct = Math.round((amt/max)*100);
    const color = CAT_COLORS[cat] || '#8a8680';
    return `<div class="bar-row">
      <div class="bar-label">${cat}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${pct}%;background:${color}">RM ${amt.toFixed(0)}</div>
      </div>
    </div>`;
  }).join('');
}

// ============================================================
// RENDER DONUT
// ============================================================
function renderDonut() {
  const catTotals = {};
  expenses.forEach(e => { catTotals[e.cat] = (catTotals[e.cat]||0) + e.amount; });
  const entries = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const total = entries.reduce((s,[,v])=>s+v,0) || 1;

  const svgEl = document.getElementById('donutSvg');
  const legendEl = document.getElementById('donutLegend');

  if (!entries.length) {
    svgEl.innerHTML = '';
    legendEl.innerHTML = '<div style="color:var(--muted);font-size:0.78rem;">Tiada data.</div>';
    return;
  }

  const cx=55, cy=55, r=40, strokeW=18;
  const circum = 2*Math.PI*r;
  let paths = '';
  let offset = 0;

  entries.forEach(([cat, amt]) => {
    const frac = amt/total;
    const dash = frac * circum;
    const color = CAT_COLORS[cat] || '#8a8680';
    paths += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}"
      stroke-width="${strokeW}" stroke-dasharray="${dash} ${circum-dash}"
      stroke-dashoffset="${-offset}" style="transition:stroke-dasharray 0.6s ease"
      transform="rotate(-90 ${cx} ${cy})"/>`;
    offset += dash;
  });

  svgEl.innerHTML = paths + `<text x="${cx}" y="${cy+5}" text-anchor="middle" fill="var(--text)" font-size="11" font-family="DM Serif Display, serif">
    ${entries.length} Kat.
  </text>`;

  legendEl.innerHTML = entries.map(([cat, amt]) => {
    const pct = Math.round((amt/total)*100);
    const color = CAT_COLORS[cat] || '#8a8680';
    return `<div class="legend-item">
      <div class="legend-dot" style="background:${color}"></div>
      <span style="color:var(--muted)">${cat}</span>
      <span style="margin-left:auto;font-weight:600">${pct}%</span>
    </div>`;
  }).join('');
}

// ============================================================
// MONTHLY CHART
// ============================================================
function renderMonthly() {
  const now = new Date();
  const months = [];
  for (let i=5; i>=0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    months.push({ year:d.getFullYear(), month:d.getMonth(), label: d.toLocaleDateString('ms-MY',{month:'short'}) });
  }

  const totals = months.map(m => {
    return expenses.filter(e => {
      const d = new Date(e.date);
      return d.getFullYear()===m.year && d.getMonth()===m.month;
    }).reduce((s,e)=>s+e.amount,0);
  });

  const max = Math.max(...totals, 1);
  const el = document.getElementById('monthBars');

  el.innerHTML = months.map((m,i) => {
    const h = Math.round((totals[i]/max)*88);
    const color = i===5 ? 'var(--accent)' : 'var(--surface2)';
    const border = i===5 ? '' : `border:1px solid var(--border)`;
    return `<div class="month-col">
      <div class="month-bar" style="height:${h}px;background:${color};${border};border-radius:4px 4px 0 0;min-height:4px;"></div>
      <div class="month-name">${m.label}</div>
    </div>`;
  }).join('');
}

// ============================================================
// RENDER ALL
// ============================================================
function renderAll() {
  renderStats();
  renderTable();
  renderBarChart();
  renderDonut();
  renderMonthly();
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError?' error':'');
  setTimeout(()=>{ t.className = 'toast' + (isError?' error':''); }, 2500);
}

// ============================================================
// UTILS
// ============================================================
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
